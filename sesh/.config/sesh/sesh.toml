#:schema https://github.com/joshmedeski/sesh/raw/main/sesh.schema.json

# Hide floax scratch session from the picker
blacklist = ["scratch"]

# Preview directories with eza in the sesh picker
[default_session]
preview_command = "eza --all --git --icons --color=always {}"

# All projects under ~/Developer/Projects get nvim on connect
[[wildcard]]
pattern = "~/Developer/Projects/*"
startup_command = "nvim"

# LifeOS — open in nvim
[[session]]
name = "LifeOS"
path = "~/Documents/LifeOS"
startup_command = "nvim"

# Dotfiles
[[session]]
name = "dotfiles"
path = "~/.dotfiles"
