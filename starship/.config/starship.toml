"$schema" = "https://starship.rs/config-schema.json"

scan_timeout = 100
command_timeout = 500
follow_symlinks = false
add_newline = true

format = """
$os\
$directory\
${custom.giturl}\
${custom.git_branch_pill}\
$git_status\
${env_var.STARSHIP_ENV_NAME}\
$status\
$line_break\
$character"""

palette = "catppuccin_mocha"

# --- Prompt character ---
[character]
disabled = false
success_symbol = "[\uf105 ](bold fg:green)"
error_symbol = "[\uf105 ](bold fg:red)"
vimcmd_symbol = "[\uf105 ](bold fg:yellow)"

# --- Directory ---
[directory]
style = "sapphire"
format = "[ $path ]($style)"
truncation_length = 4

[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Music" = " "
"Pictures" = " "
"Developer" = "󰲋 "

# --- OS icon ---
[os]
disabled = false
style = "fg:subtext1"

[os.symbols]
Macos = "󰟀"

# --- Git remote icon ---
[custom.giturl]
description = "Display symbol for remote Git server"
command = """
GIT_REMOTE=$(command git ls-remote --get-url 2> /dev/null)
if [[ "$GIT_REMOTE" =~ "github" ]]; then
    printf '\uf09b '
elif [[ "$GIT_REMOTE" =~ "gitlab" ]]; then
    printf '\uf296 '
elif [[ "$GIT_REMOTE" =~ "bitbucket" ]]; then
    printf '\uf171 '
elif [[ "$GIT_REMOTE" =~ "git" ]]; then
    printf '\uf1d3 '
else
    printf '\uf115 '
fi
"""
when = "git rev-parse --is-inside-work-tree 2> /dev/null"
format = "$output"
require_repo = true
ignore_timeout = true

# --- Git branch ---
[fill]
symbol = " "

# --- Git branch (with worktree indicator) ---
# Worktree detection is handled by custom.git_branch_pill which renders the full pill
[custom.git_branch_pill]
description = "Git branch pill with optional worktree icon"
command = """
branch=$(git rev-parse --abbrev-ref HEAD 2>/dev/null)
common_dir=$(git rev-parse --path-format=absolute --git-common-dir 2>/dev/null)
git_dir=$(git rev-parse --path-format=absolute --git-dir 2>/dev/null)
if [ "$common_dir" != "$git_dir" ]; then
    echo "󰔱 \uf418 $branch"
else
    echo "\uf418 $branch"
fi
"""
when = "git rev-parse --is-inside-work-tree >/dev/null 2>&1"
format = " [\ue0b6](fg:surface0)[$output](fg:lavender bg:surface0)[\ue0b4](fg:surface0) "
style = "fg:lavender bg:surface0"
require_repo = true
ignore_timeout = true

[git_branch]
disabled = true

# --- Git status (detailed counts) ---
[git_status]
format = "[$untracked$staged$modified$renamed$deleted$conflicted$stashed$ahead_behind]($style)"
staged     = "[+${count} ](green)"
modified   = "[!${count} ](yellow)"
renamed    = "[»${count} ](blue)"
deleted    = "[-${count} ](red)"
untracked  = "[?${count} ](sapphire)"
stashed    = "[≡${count} ](lavender)"
conflicted = "[✖${count} ](red bold)"
ahead      = "[⇡${count} ](teal)"
behind     = "[⇣${count} ](peach)"
diverged   = "[⇕⇡${ahead_count}⇣${behind_count} ](mauve)"

# --- Project environment indicator ---
[env_var.STARSHIP_ENV_NAME]
format = " [\uf0c2 $env_value](yellow)"
disabled = false

# --- Right-side language/tool indicators ---
[nodejs]
symbol = "\ue718 "
format = "[$symbol($version) ]($style)"

[rust]
symbol = "\ue7a8 "
format = "[$symbol($version) ]($style)"

[golang]
symbol = "\ue627 "
format = "[$symbol($version) ]($style)"
detect_files = ["go.mod"]

[python]
symbol = "\ue73c "
format = "[$symbol($version) ]($style)"

[docker_context]
symbol = "\uf308 "
format = "[$symbol($context) ]($style)"

[package]
disabled = true

# --- Status (only shows on error) ---
[status]
disabled = false
format = " [$symbol$status]($style)"
symbol = "\uf06a "
style = "fg:red"

# --- Disabled modules ---
[username]
disabled = true

[time]
disabled = true

[line_break]
disabled = false

# --- Catppuccin Mocha palette ---
[palettes.catppuccin_mocha]
crust = "#11111b"
mantle = "#181825"
base = "#262626"
overlay2 = "#9399b2"
overlay1 = "#7f849c"
overlay0 = "#6c7086"
surface2 = "#585b70"
surface1 = "#45475a"
surface0 = "#313244"
text = "#cdd6f4"
subtext1 = "#bac2de"
subtext0 = "#a6adc8"
rosewater = "#f5e0dc"
flamingo = "#f2cdcd"
pink = "#f5c2e7"
mauve = "#cba6f7"
red = "#f38ba8"
maroon = "#eba0ac"
peach = "#fab387"
yellow = "#f9e2af"
green = "#a6e3a1"
teal = "#94e2d5"
sky = "#89dceb"
sapphire = "#74c7ec"
blue = "#89b4fa"
lavender = "#b4befe"
