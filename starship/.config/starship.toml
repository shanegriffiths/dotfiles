"$schema" = "https://starship.rs/config-schema.json"

scan_timeout = 100
command_timeout = 500
follow_symlinks = false
add_newline = true

format = """
$os\
$directory\
${custom.giturl}\
${custom.git_branch_pill}\
$git_status\
${env_var.STARSHIP_ENV_NAME}\
$status\
$line_break\
$character"""

# Colors resolve to the terminal's live ANSI palette, so the prompt follows
# whatever Ghostty theme is active (dark Mocha / light GitHub High Contrast).

# --- Prompt character ---
[character]
disabled = false
success_symbol = "[\uf105 ](bold fg:green)"
error_symbol = "[\uf105 ](bold fg:red)"
vimcmd_symbol = "[\uf105 ](bold fg:yellow)"

# --- Directory ---
[directory]
style = "red"
format = "[ $path ]($style)"
truncation_length = 4

[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Music" = " "
"Pictures" = " "
"Developer" = "󰲋 "

# --- OS icon ---
[os]
disabled = false
style = "fg:bright-black"

[os.symbols]
Macos = "\uf179"

# --- Git remote icon ---
[custom.giturl]
description = "Display symbol for remote Git server"
command = """
GIT_REMOTE=$(command git ls-remote --get-url 2> /dev/null)
if [[ "$GIT_REMOTE" =~ "github" ]]; then
    printf '\uf09b '
elif [[ "$GIT_REMOTE" =~ "gitlab" ]]; then
    printf '\uf296 '
elif [[ "$GIT_REMOTE" =~ "bitbucket" ]]; then
    printf '\uf171 '
elif [[ "$GIT_REMOTE" =~ "git" ]]; then
    printf '\uf1d3 '
else
    printf '\uf115 '
fi
"""
when = "git rev-parse --is-inside-work-tree 2> /dev/null"
format = "$output"
require_repo = true
ignore_timeout = true

# --- Git branch ---
[fill]
symbol = " "

# --- Git branch (with worktree indicator) ---
# Worktree detection is handled by custom.git_branch_pill which renders the full pill
[custom.git_branch_pill]
description = "Git branch pill with per-mode colors (light grey in light mode, Catppuccin grey in dark). Colors emitted directly via ANSI so they follow the active appearance; detection via macOS AppleInterfaceStyle. Glyphs are octal UTF-8: caps E0B6/E0B4, branch F418, worktree F0531. Outer spacing lives in `format` (command output is whitespace-trimmed by Starship)."
command = '''
branch=$(git rev-parse --abbrev-ref HEAD 2>/dev/null)
cd=$(git rev-parse --path-format=absolute --git-common-dir 2>/dev/null)
gd=$(git rev-parse --path-format=absolute --git-dir 2>/dev/null)
[ "$cd" != "$gd" ] && wt=$(printf '\363\260\224\261 ') || wt=''
if [ "$(defaults read -g AppleInterfaceStyle 2>/dev/null)" = "Dark" ]; then
  cap="38;2;88;91;112"; body="48;2;88;91;112;38;2;116;168;252"
else
  cap="38;2;208;215;222"; body="48;2;208;215;222;38;2;36;41;47"
fi
printf '\033[%sm\356\202\266\033[0m\033[%sm %s\357\220\230 %s \033[0m\033[%sm\356\202\264\033[0m' "$cap" "$body" "$wt" "$branch" "$cap"
'''
when = "git rev-parse --is-inside-work-tree >/dev/null 2>&1"
format = " $output "
require_repo = true
ignore_timeout = true
[git_branch]
disabled = true

# --- Git status (detailed counts) ---
[git_status]
format = "[$untracked$staged$modified$renamed$deleted$conflicted$stashed$ahead_behind]($style)"
staged     = "[+${count} ](green)"
modified   = "[!${count} ](yellow)"
renamed    = "[»${count} ](blue)"
deleted    = "[-${count} ](red)"
untracked  = "[?${count} ](cyan)"
stashed    = "[≡${count} ](purple)"
conflicted = "[✖${count} ](red bold)"
ahead      = "[⇡${count} ](bright-cyan)"
behind     = "[⇣${count} ](bright-red)"
diverged   = "[⇕⇡${ahead_count}⇣${behind_count} ](bright-purple)"

# --- Project environment indicator ---
[env_var.STARSHIP_ENV_NAME]
format = " [\uf0c2 $env_value](yellow)"
disabled = false

# --- Right-side language/tool indicators ---
[nodejs]
symbol = "\ue718 "
format = "[$symbol($version) ]($style)"

[rust]
symbol = "\ue7a8 "
format = "[$symbol($version) ]($style)"

[golang]
symbol = "\ue627 "
format = "[$symbol($version) ]($style)"
detect_files = ["go.mod"]

[python]
symbol = "\ue73c "
format = "[$symbol($version) ]($style)"

[docker_context]
symbol = "\uf308 "
format = "[$symbol($context) ]($style)"

[package]
disabled = true

# --- Status (only shows on error) ---
[status]
disabled = false
format = " [$symbol$status]($style)"
symbol = "\uf06a "
style = "fg:red"

# --- Disabled modules ---
[username]
disabled = true

[time]
disabled = true

[line_break]
disabled = false
