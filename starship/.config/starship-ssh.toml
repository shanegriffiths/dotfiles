# Minimal Starship config for SSH sessions — fast, no git overhead.
# Matches the local two-line layout: icon + directory on top, character below.
"$schema" = "https://starship.rs/config-schema.json"

scan_timeout = 50
command_timeout = 200
add_newline = true

format = """
$hostname\
$username\
$directory\
$status\
$line_break\
$character"""

[hostname]
ssh_only = true
style = "fg:#bac2de"
format = "[󰟀 ](fg:#bac2de)"

[username]
show_always = true
style_user = "fg:#f9e2af"
style_root = "fg:#f38ba8 bold"
format = "[$user]($style)"

[directory]
style = "fg:#74c7ec"
format = "[ $path ]($style)"
truncation_length = 4

[character]
success_symbol = "[\uf105 ](bold fg:green)"
error_symbol = "[\uf105 ](bold fg:red)"

[status]
disabled = false
format = " [$symbol$status]($style)"
symbol = "\uf06a "
style = "fg:red"

[line_break]
disabled = false

# Disable everything else
[git_branch]
disabled = true

[git_status]
disabled = true

[git_commit]
disabled = true

[nodejs]
disabled = true

[python]
disabled = true

[package]
disabled = true
