# AeroSpace Configuration
# https://nikitabobko.github.io/AeroSpace/guide

# Startup commands
after-startup-command = [
	'exec-and-forget borders active_color=0xFFC4262B inactive_color=0xff494d64 width=8.0 hidpi=true style=round blacklist="Sleeve"',
	'exec-and-forget sketchybar',
	'mode desktop',
]

# Notify Sketchybar about workspace change
exec-on-workspace-change = [
	'/bin/bash',
	'-c',
	'sketchybar --trigger aerospace_workspace_change FOCUSED_WORKSPACE=$AEROSPACE_FOCUSED_WORKSPACE',
]

# Update border color based on floating state
on-focus-changed = [
	'exec-and-forget $HOME/.config/sketchybar/plugins/borders.sh',
]

# Start AeroSpace at login
start-at-login = true

# Normalizations
enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

# Accordion padding (0 to disable)
accordion-padding = 50

# Default layout: tiles|accordion
default-root-container-layout = 'tiles'

# Default orientation: horizontal|vertical|auto
default-root-container-orientation = 'auto'

# Mouse follows focus when monitor changes (uncomment to enable)
# on-focused-monitor-changed = ['move-mouse monitor-lazy-center']

# Disable macOS "Hide application" (cmd-h) feature
automatically-unhide-macos-hidden-apps = false

