# Dark-mode overrides for tmux — sourced only when macOS appearance is Dark
# (see the appearance block at the bottom of tmux.conf).
# The status bar stays catppuccin mocha; this only fixes overlay popups, which
# catppuccin leaves on its mocha base (#1e1e2e). Force the #262626 "black"
# surface so popups match Ghostty/nvim instead of the blue-ish base.
set -g popup-style "bg=#262626,fg=#cdd6f4"
set -g popup-border-style "fg=#45475a,bg=#262626"
