# ============================================
# tmux - Configuration
# ============================================

# --- Prefix ---
# Remap prefix from Ctrl+b to Ctrl+a (easier to reach)
unbind C-b
set -g prefix C-a
bind C-a send-prefix                    # Allow sending Ctrl+a to apps (press twice)

# --- General ---
set -g mouse on                         # Enable mouse (scroll, resize, select panes)
set -g base-index 1                     # Start window numbering at 1 (not 0)
setw -g pane-base-index 1              # Start pane numbering at 1 (not 0)
set -g renumber-windows on              # Re-number windows when one is closed
set -g escape-time 0                    # No delay after pressing Escape (important for vim)
set -g history-limit 50000              # Scrollback buffer size
set -g focus-events on                  # Pass focus events to apps (needed for nvim autoread)
set -g detach-on-destroy off            # Switch to another session instead of detaching when a session is destroyed

# --- Terminal / Color support (for Ghostty + nvim) ---
set -g default-terminal "tmux-256color"                  # Tell apps we support 256 colors
set -ag terminal-overrides ",xterm-ghostty:RGB"          # Enable true color (24-bit) for Ghostty
set -g cursor-style blinking-block                       # Blinking block cursor
set -g allow-passthrough all                             # Let apps send escape sequences through tmux (needed for image display, yazi, etc.)
set -ga update-environment TERM                          # Pass TERM to new sessions (so apps detect terminal correctly)
set -ga update-environment TERM_PROGRAM                  # Pass TERM_PROGRAM to new sessions (so apps detect Ghostty)

# --- Extended keys (pass Shift+Enter, Ctrl+; etc. to apps) ---
set -s extended-keys always
set -as terminal-features 'xterm-ghostty:extkeys'

# --- Sessions ---
bind -N "last-session (via sesh)" \; run-shell "sesh last"  # prefix ; toggle between last two sessions
# Cycle sessions in the SAME order shown in the status bar (alphabetical, scratch hidden),
# with wraparound. -r makes them repeatable: prefix then tap to keep cycling.
bind -r Tab  run-shell "~/.config/tmux/sessions-cycle.sh next"  # prefix ⇥ next session (repeatable)
bind -r BTab run-shell "~/.config/tmux/sessions-cycle.sh prev"  # prefix ⇧⇥ previous session (repeatable)
bind -r Up   run-shell "~/.config/tmux/sessions-cycle.sh prev"  # prefix ↑ previous session (repeatable)
bind -r Down run-shell "~/.config/tmux/sessions-cycle.sh next"  # prefix ↓ next session (repeatable)

# Click a session name in the status bar to switch to it (like clicking a window).
# tmux makes the centre window list clickable automatically via built-in "window"
# ranges; the custom session list (session-list.sh) wraps each name in a user range
# whose string is the session name. This single handler routes every status click:
#   built-in range (window/pane/left/right/session) -> default select-window
#   user range (a session name)                      -> switch to that session
#   empty area                                       -> nothing
bind -n MouseDown1Status {
  if -F "#{m/r:^(window|pane|left|right|session)$,#{mouse_status_range}}" {
    select-window -t =
  } {
    if -F "#{mouse_status_range}" {
      run-shell "tmux switch-client -t '#{mouse_status_range}'"
    }
  }
}

# --- Windows ---
bind c new-window -c "#{pane_current_path}"              # New window opens in current directory
bind n next-window                                       # Next window
bind Left  previous-window                               # Ctrl+a ← previous window
bind Right next-window                                   # Ctrl+a → next window
set -wg automatic-rename on                              # Auto-rename windows to running command
set -g automatic-rename-format "#{pane_current_command}"  # Format: shows command name (e.g. nvim, zsh, node)
bind , set-window-option automatic-rename off \; command-prompt -I "#W" "rename-window '%%'"  # Rename window and keep the name

# --- Splits (open in current directory) ---
bind | split-window -h -c "#{pane_current_path}"         # Horizontal split (side by side)
bind - split-window -v -c "#{pane_current_path}"         # Vertical split (top/bottom)
unbind '"'                                                # Remove default horizontal split
unbind %                                                  # Remove default vertical split

# --- Pane navigation (vim-style) ---
bind h select-pane -L                   # Move left
bind j select-pane -D                   # Move down
bind k select-pane -U                   # Move up
bind l select-pane -R                   # Move right

# --- Pane resizing (repeatable with -r) ---
bind -r H resize-pane -L 5             # Grow left
bind -r J resize-pane -D 5             # Grow down
bind -r K resize-pane -U 5             # Grow up
bind -r L resize-pane -R 5             # Grow right

# --- Pane utilities ---
bind -r m resize-pane -Z               # Toggle maximize/restore current pane
bind-key x kill-pane                    # Close pane without confirmation prompt

# --- Copy mode (vi-style) ---
unbind v
bind v copy-mode                        # Enter copy mode (scroll, search, select)
set-window-option -g mode-keys vi       # Use vim keys in copy mode
bind-key -T copy-mode-vi 'v' send -X begin-selection    # v to start selecting
bind-key -T copy-mode-vi 'y' send -X copy-selection     # y to yank/copy
unbind -T copy-mode-vi MouseDragEnd1Pane                 # Don't auto-copy on mouse drag (use y instead)

# --- Floating pane (floax) ---
# Toggle: prefix+p | Menu (resize/embed/fullscreen): prefix+P
set -g @floax-bind 'p'
set -g @floax-bind-menu 'P'
set -g @floax-width '85%'
set -g @floax-height '85%'
set -g @floax-border-color 'red'
set -g @floax-text-color '#cdd6f4'
set -g @floax-change-dir-to-current 'true'
set -g @floax-session-name 'scratch'

# --- Sesh session picker (external CLI) ---
# Inside the picker: ^a=all  ^t=tmux  ^g=config  ^x=zoxide  ^f=find dirs  ^d=kill session  ^r=resurrect snapshots
bind-key "t" run-shell "~/.config/tmux/sesh-connect.sh \"$(
        sesh list --icons | fzf-tmux -p 90%,80% \
        --color 'hl:1,bg:-1,preview-bg:-1' \
        --no-sort --ansi --border-label ' sesh ' --prompt '⚡  ' \
        --header '🔑 ^a all | ^t tmux | ^g conf | ^x zoxide | ^d kill | ^f find | ^r resurrect' \
        --bind 'tab:down,btab:up' \
        --bind 'ctrl-a:change-prompt(🛸  )+reload(sesh list --icons)' \
        --bind 'ctrl-t:change-prompt(◧  )+reload(sesh list -t --icons)' \
        --bind 'ctrl-g:change-prompt(⛯  )+reload(sesh list -c --icons)' \
        --bind 'ctrl-x:change-prompt(🗃  )+reload(sesh list -z --icons)' \
        --bind 'ctrl-f:change-prompt(🔭  )+reload(fd -H -d 2 -t d -E .Trash . ~)' \
        --bind 'ctrl-d:execute(tmux kill-session -t {2..})+change-prompt(👽  )+reload(sesh list --icons)' \
        --bind 'ctrl-r:change-prompt(  )+reload($HOME/.config/tmux/resurrect-pick.sh list)' \
        --preview-window 'right:55%' \
        --preview '$HOME/.config/tmux/sesh-preview.sh {}'
)\""

# --- Navi cheatsheet ---
# Opens navi in a split, pastes selected command into the previous pane
bind-key -T prefix C-n split-window \
  "$SHELL --login -i -c 'navi --print | tmux load-buffer -b tmp - ; tmux paste-buffer -p -t {last} -b tmp -d'"

# --- Reload config ---
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded"

# --- Plugins ---
set-environment -g TMUX_PLUGIN_MANAGER_PATH ~/.config/tmux/plugins
set -g @plugin 'tmux-plugins/tpm'                        # Plugin manager (install: prefix+I, update: prefix+U)
set -g @plugin 'christoomey/vim-tmux-navigator'          # Seamless Ctrl+hjkl between tmux panes and nvim splits
set -g @plugin 'tmux-plugins/tmux-resurrect'             # Save/restore sessions across restarts (prefix+Ctrl+s to save, prefix+Ctrl+r to restore)
set -g @plugin 'tmux-plugins/tmux-continuum'             # Auto-save sessions every 15 min, auto-restore on start
set -g @plugin 'omerxx/tmux-floax'                       # Persistent floating pane (toggle on/off, resize, embed)
set -g @plugin 'catppuccin/tmux'                         # Catppuccin Mocha theme for status bar

# --- Plugin settings ---
set -g @resurrect-capture-pane-contents "on"             # Save pane contents when saving session
set -g @continuum-restore "off"                          # Manual restore only: prefix+Ctrl+r (auto-save still runs every 15 min)

# --- Catppuccin theme ---
# Flavor follows macOS appearance: mocha (dark) / latte (light).
# Synchronous on `prefix r`; on a cold server start tmux defers the shell call,
# so the first paint may be dark until you reload (prefix r).
set -g @catppuccin_flavor "mocha"
if-shell '[ "$(defaults read -g AppleInterfaceStyle 2>/dev/null)" != "Dark" ]' \
  'set -g @catppuccin_flavor "latte"'
set -g @catppuccin_status_background "default"            # Solid status bar background
set -g @catppuccin_window_text " #W"                     # Show window name (auto-renamed to command, or manual name if set)
set -g @catppuccin_window_current_text " #W"             # Same for active window
set -g @catppuccin_pane_status_enabled "off"             # No per-pane status
set -g @catppuccin_pane_border_status "off"              # No pane border labels

# --- Status bar: left ---
# Shows: [session name] │ [current directory] │ [zoom indicator]
# Session name turns red when prefix key is active
set -g status-left-length 200
set -g status-left ""
set -ga status-left " #(~/.config/tmux/session-list.sh '#S' '#{client_prefix}') "
set -ga status-left "#[bg=default,fg=#{@thm_overlay_0},none]│"
set -ga status-left "#[bg=default,fg=#{@thm_blue}]  #{=/-32/...:#{s|$USER|~|:#{b:pane_current_path}}} "
set -ga status-left "#[bg=default,fg=#{@thm_overlay_0},none]#{?window_zoomed_flag,│,}"
set -ga status-left "#[bg=default,fg=#{@thm_yellow}]#{?window_zoomed_flag,  zoom ,}"

# --- Status bar: right ---
set -g status-right "#[bg=#262626] "

# --- Status bar: general ---
set -g status-position bottom                            # Status bar at bottom of screen
set -g status-style "bg=#262626"                          # Status bar background color (matches Ghostty/nvim)
set -g status-justify "absolute-centre"                  # Centre the window list

# --- TPM (keep at very bottom) ---
run '~/.config/tmux/plugins/tpm/tpm'

# --- Red accent (both modes) ---
# Repaint catppuccin's blue path accent to ANSI red so it tracks the Ghostty
# palette (dark-red in light, Catppuccin red in dark) in BOTH modes. The status
# format references #{@thm_blue} live, so this takes effect on the next redraw.
set -g @thm_blue "red"

# --- Appearance overrides, sourced AFTER the theme plugin so they win ---
# Light: GitHub-light surface + red accent. Dark: keep mocha bar, but give
# popups the #262626 "black" surface (catppuccin leaves them on its base).
# Re-applied on `prefix r`.
if-shell '[ "$(defaults read -g AppleInterfaceStyle 2>/dev/null)" = "Dark" ]' \
  'source-file ~/.config/tmux/theme-dark.conf' \
  'source-file ~/.config/tmux/theme-light.conf'
